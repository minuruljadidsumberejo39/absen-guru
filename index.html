<!DOCTYPE html>
<html>
<head>
    <base target='_top'>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Guru GPS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111424">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'>
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css' rel='stylesheet'>
  
    <style>
        :root { 
            --primary: #6C5DD3; 
            --primary-hover: #5a4bbf; 
            --success: #00D26A; 
            --danger: #F45B69; 
            --dark: #242731; 
            --text-main: #FFFFFF; 
            --text-muted: rgba(255, 255, 255, 0.7); 
            --glass-bg: rgba(255, 255, 255, 0.1); 
            --glass-border: rgba(255, 255, 255, 0.2); 
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); 
        } 
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; } 
        body { background: #111424; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: var(--text-main); } 
        .background-shapes { position: absolute; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; } 
        .shape { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.8; animation: drift 20s infinite alternate; } 
        .shape-1 { width: 400px; height: 400px; background: #6C5DD3; top: -100px; left: -100px; animation-delay: 0s; } 
        .shape-2 { width: 300px; height: 300px; background: #FF7E67; bottom: -50px; right: -50px; animation-delay: -5s; } 
        .shape-3 { width: 250px; height: 250px; background: #00D26A; bottom: 20%; left: 20%; animation-delay: -10s; } 
        @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 30px) scale(1.1); } } 
        .container { width: 100%; max-width: 400px; padding: 20px; z-index: 10; } 
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px 30px; box-shadow: var(--glass-shadow); text-align: center; transition: transform 0.3s ease, opacity 0.3s ease; } 
        .hidden { display: none !important; } 
        .fade-in { animation: fadeIn 0.5s ease forwards; } 
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } } 
        .logo-box { width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), #FF7E67); border-radius: 20px; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(108, 93, 211, 0.4); } 
        .logo-icon { font-size: 32px; color: white; } 
        h2 { font-size: 24px; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.5px; } 
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; } 
        .header-info { text-align: left; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); } 
        .header-info h3 { font-size: 18px; font-weight: 600; } 
        .user-id { display: inline-block; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-top: 5px; color: var(--primary); font-weight: bold; border: 1px solid rgba(108, 93, 211, 0.3); } 
        .input-group { position: relative; margin-bottom: 20px; } 
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); } 
        .input-group input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); padding: 15px 15px 15px 45px; border-radius: 12px; color: white; font-size: 15px; outline: none; transition: 0.3s; } 
        .input-group input::placeholder { color: var(--text-muted); } 
        .input-group input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 0 4px rgba(108, 93, 211, 0.2); } 
        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(108, 93, 211, 0.4); } 
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); } 
        .btn-disabled { background: #444; cursor: not-allowed; box-shadow: none; opacity: 0.7; } 
        .btn-disabled:hover { background: #444; transform: none; } 
        .btn-text { background: none; border: none; color: var(--text-muted); margin-top: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; } 
        .btn-text:hover { color: white; } 
        .status-box { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 25px; } 
        .status-icon { font-size: 40px; margin-bottom: 10px; color: var(--primary); } 
        .pulse { animation: pulse 1.5s infinite alternate; } 
        @keyframes pulse { 0% { transform: scale(0.95); text-shadow: 0 0 10px rgba(108, 93, 211, 0.5); } 100% { transform: scale(1.1); text-shadow: 0 0 20px rgba(108, 93, 211, 1); } } 
        .status-box h4 { font-size: 16px; margin-bottom: 5px; } 
        .gps-detail { font-size: 12px; color: var(--text-muted); } 
        .result-box { padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-align: left; font-size: 14px; } 
        .result-box.success { background: rgba(0, 210, 106, 0.1); border: 1px solid var(--success); color: var(--success); } 
        .result-box.error { background: rgba(244, 91, 105, 0.1); border: 1px solid var(--danger); color: var(--danger); } 
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(17, 20, 36, 0.8); backdrop-filter: blur(10px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; } 
        .spinner { width: 50px; height: 50px; border: 4px solid var(--glass-border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; } 
        @keyframes spin { 100% { transform: rotate(360deg); } } 
    </style>
</head>
<body>
    <div id='loadingOverlay' class='hidden'><div class='spinner'></div><p id='loadingText' style='color: white; margin-top: 15px; font-weight: 500;'>Memuat...</p></div>
    <div class='container'>
        <div id='loginPage' class='glass-card fade-in'>
            <img src='https://i.postimg.cc/ZKC2FSs1/LOGO-MADRASAH-02.png' alt='Logo Sekolah' style='width:80px;height:80px;object-fit:contain;margin:0 auto 15px;display:block;border-radius:15px;background:rgba(255,255,255,0.1);padding:5px;'>
            <h2>Portal Absen Guru MINUJA</h2>
            <p class='subtitle'>Sistem Absensi GPS</p>
            <div class='input-group'><i class='fas fa-user'></i><input type='text' id='username' placeholder='Username/NIP' autocomplete='off'></div>
            <div class='input-group'><i class='fas fa-lock'></i><input type='password' id='password' placeholder='Password'></div>
            <button onclick='handleLogin()' class='btn-primary'>Masuk <i class='fas fa-arrow-right'></i></button>
        </div>
  
        <div id='dashboardPage' class='glass-card hidden'>
            <div class='header-info'><h3 id='welcomeName'>Selamat Datang, Guru</h3><span class='user-id' id='welcomeId'>G-000</span></div>
            <div class='status-box'><div class='status-icon' id='gpsIcon'><i class='fas fa-map-marker-alt pulse'></i></div><h4 id='gpsStatus'>Mencari Lokasi...</h4><p id='gpsDetail' class='gps-detail'>Mengakses satelit GPS</p></div>
            <div id='resultBox' class='result-box hidden'><i id='resultIcon' class='fas fa-check-circle'></i><p id='resultMsg'>Berhasil</p></div>
            <button id='btnCheckIn' onclick='handleCheckIn()' class='btn-primary btn-disabled' disabled>Lakukan Absensi <i class='fas fa-fingerprint'></i></button>
            <button onclick='logout()' class='btn-text'><i class='fas fa-sign-out-alt'></i> Keluar</button>
        </div>
    </div>
    <div class='background-shapes'><div class='shape shape-1'></div><div class='shape shape-2'></div><div class='shape shape-3'></div></div>

    <script>
        let currentUser=null; let currentLat=null; let currentLon=null; 
        const elLoginPage=document.getElementById('loginPage'); const elDashboardPage=document.getElementById('dashboardPage'); const elLoading=document.getElementById('loadingOverlay'); const elLoadingText=document.getElementById('loadingText'); const btnCheckIn=document.getElementById('btnCheckIn'); const gpsStatus=document.getElementById('gpsStatus'); const gpsDetail=document.getElementById('gpsDetail'); const gpsIcon=document.getElementById('gpsIcon'); const resultBox=document.getElementById('resultBox'); const resultMsg=document.getElementById('resultMsg'); const resultIcon=document.getElementById('resultIcon'); 
        
        function showLoading(t){ elLoadingText.innerText=t; elLoading.classList.remove('hidden'); } 
        function hideLoading(){ elLoading.classList.add('hidden'); } 
        function showResult(s,m){ resultBox.classList.remove('hidden','success','error'); resultIcon.className=s?'fas fa-check-circle':'fas fa-exclamation-circle'; resultBox.classList.add(s?'success':'error'); resultMsg.innerText=m; } 
        
        window.onload=()=>{ 
            const s=localStorage.getItem('guruSession'); 
            if(s){ currentUser=JSON.parse(s); showDashboard(); } 
        }; 

        function handleLogin(){ 
            const u=document.getElementById('username').value; 
            const p=document.getElementById('password').value; 
            if(!u||!p){ alert('Isi form!'); return; } 
            showLoading('Cek data...'); 
            
            // Catatan: Jika ditaruh di GitHub, fungsi google.script.run perlu disesuaikan.
            // Untuk tes awal, biarkan seperti ini jika Anda membuka lewat link Deployment Apps Script.
            google.script.run.withSuccessHandler((r)=>{ 
                hideLoading(); 
                if(r.success){ 
                    currentUser=r.guru; 
                    localStorage.setItem('guruSession',JSON.stringify(currentUser)); 
                    showDashboard(); 
                } else { alert(r.message); } 
            }).withFailureHandler((e)=>{ 
                hideLoading(); 
                alert('Error! ' + e.message); 
            }).loginGuru(u,p); 
        } 

        function showDashboard(){ 
            elLoginPage.classList.add('hidden'); 
            elDashboardPage.classList.remove('hidden'); 
            elDashboardPage.classList.add('fade-in'); 
            document.getElementById('welcomeName').innerText='Halo, '+currentUser.nama; 
            document.getElementById('welcomeId').innerText=currentUser.id; 
            resultBox.classList.add('hidden'); 
            initGPS(); 
        } 

        function logout(){ 
            localStorage.removeItem('guruSession'); 
            currentUser=null; 
            elDashboardPage.classList.add('hidden'); 
            elLoginPage.classList.remove('hidden'); 
            elLoginPage.classList.add('fade-in'); 
            document.getElementById('username').value=''; 
            document.getElementById('password').value=''; 
        } 

        function initGPS(){ 
            if(!navigator.geolocation){ setGpsError('Browser tidak support GPS'); return; } 
            gpsStatus.innerText='Mencari Lokasi...'; 
            navigator.geolocation.getCurrentPosition((pos)=>{ 
                currentLat=pos.coords.latitude; 
                currentLon=pos.coords.longitude; 
                gpsIcon.innerHTML='<i class="fas fa-satellite-dish"></i>'; 
                gpsIcon.style.color='#00D26A'; 
                gpsStatus.innerText='Lokasi Ketemu!'; 
                gpsDetail.innerText='Akurasi: ' + Math.round(pos.coords.accuracy) + ' m'; 
                btnCheckIn.disabled=false; 
                btnCheckIn.classList.remove('btn-disabled'); 
            }, (err)=>{ 
                let m='Gagal lokasi'; 
                if(err.code==1)m='Akses lokasi ditolak'; 
                setGpsError(m); 
            }, {enableHighAccuracy:true, timeout:10000} ); 
        } 

        function setGpsError(m){ 
            gpsIcon.innerHTML='<i class="fas fa-exclamation-triangle"></i>'; 
            gpsIcon.style.color='#F45B69'; 
            gpsStatus.innerText='Gagal'; 
            gpsDetail.innerText=m; 
            btnCheckIn.disabled=true; 
            btnCheckIn.classList.add('btn-disabled'); 
        } 

        function handleCheckIn(){ 
            if(!currentLat)return; 
            showLoading('Mencatat...'); 
            google.script.run.withSuccessHandler((r)=>{ 
                hideLoading(); 
                if(r.success){ 
                    showResult(true, r.message +' Pukul: '+r.time); 
                    btnCheckIn.disabled=true; 
                    btnCheckIn.classList.add('btn-disabled'); 
                    btnCheckIn.innerHTML='Sudah Absen'; 
                } else { 
                    showResult(false, r.message + ' Jarak: '+r.distance+'m'); 
                } 
            }).withFailureHandler((e)=>{ 
                hideLoading(); 
                showResult(false,e.message); 
            }).processAttendanceGPS(currentUser.id, currentUser.nama, currentLat, currentLon); 
        } 
    </script>
</body>
</html>
